name: recordsbl
description: Meeting recorder with resumable S3 upload
publish_to: "none"
version: 1.1.0

environment:
  sdk: ">=3.5.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  record: ^6.2.0
  audio_session: ^0.1.21
  permission_handler: ^11.3.1
  path_provider: ^2.1.5
  path: ^1.9.0
  sqflite: ^2.4.1
  dio: ^5.7.0
  uuid: ^4.5.1
  intl: ^0.19.0
  shared_preferences: ^2.3.3
  audioplayers: ^6.5.0
  flutter_slidable: ^3.1.1
  package_info_plus: ^8.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/branding/aist_logo.png
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: assets/branding/aist_logo.png

flutter:
  uses-material-design: true
  assets:
    - assets/branding/aist_logo.png
